<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imposter Game</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Titan+One&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../css/main.css">
    <link rel="stylesheet" href="../../css/create.css">

</head>
<body>
    <div class="big-container">
        SELECT TOPIC
    </div>
    <div class="topics" id="topic-container"></div>

    <div class="big-container">
        PLAYER COUNT
    </div>
    <div class="player-count-container" id="player-count-container">
        <div class="player-add-container" id="player-add-container">
            <input type="text" class="player-name-input" id="player-name-input" placeholder="Player Name" maxlength="20">
            <button class="player-add-button" id="player-add-button">Add Player</button>
        </div>

        <div class="player-container" id="player-container">
            <button class="player-tile" id="player-tile"></button>
        </div>
    </div>
</body>

<script type="module" src="../../js/create_local.js"></script>
</html>
